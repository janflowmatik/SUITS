<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – SUITS modern menswear</title>
  <link rel="icon" type="image/png" href="Hut.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0c0b09;
      --gold:   #c9a042;
      --gold-light: #e8c06a;
      --white:  #f5f0e8;
      --muted:  #7a756d;
      --border: rgba(201, 160, 66, 0.22);
      --font:   'Cormorant Garamond', Georgia, serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Diagonale Linien-Textur */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 50px,
        rgba(201, 160, 66, 0.025) 50px,
        rgba(201, 160, 66, 0.025) 51px
      );
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }

    .hat {
      width: 90px;
      margin: 0 auto 32px;
      opacity: 0.9;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 600;
      line-height: 1;
      color: var(--gold);
      opacity: 0.18;
      letter-spacing: -0.04em;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      z-index: 0;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .label::before, .label::after {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--gold);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    h1 em {
      color: var(--gold);
      font-style: normal;
    }

    p {
      font-size: 1.1rem;
      color: rgba(245, 240, 232, 0.65);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--gold);
      padding: 15px 36px;
      border: none;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }
    .btn svg {
      width: 14px; height: 14px;
      transition: transform 0.2s;
    }
    .btn:hover svg { transform: translateX(4px); }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 40px 0 0;
      opacity: 0.3;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { font-size: 14px; color: var(--gold); }
  </style>
</head>
<body>

  <div class="error-code" aria-hidden="true">404</div>

  <div class="content">
    <img src="Hut.png" alt="SUITS Hut" class="hat">

    <div class="label">Seite nicht gefunden</div>

    <h1>Diese Seite hat sich<br>wohl <em>falsch angezogen.</em></h1>

    <p>
      Die gesuchte Seite existiert leider nicht – aber unser Sortiment schon.
      Komm zurück zur Startseite und finde deinen perfekten Look.
    </p>

    <a href="index.html" class="btn">
      Zurück zur Startseite
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 7h10M8 3l4 4-4 4"/>
      </svg>
    </a>

    <div class="divider"><span>✦</span></div>
  </div>

</body>
</html>
