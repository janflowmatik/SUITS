<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Seite nicht gefunden | SUITS modern menswear</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="Hut.png" />
  <link rel="apple-touch-icon" href="Hut.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:       #0a0a0a;
      --black-rich:  #111111;
      --black-soft:  #1a1a1a;
      --gold:        #c9a84c;
      --gold-light:  #e0c270;
      --gold-dim:    #8a6e30;
      --gold-subtle: rgba(201,168,76,0.08);
      --white:       #ffffff;
      --border:      rgba(201,168,76,0.2);
      --border-soft: rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── GRAIN ─── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* ─── NAV ─── */
    nav {
      position: relative; z-index: 10;
      background: rgba(10,10,10,0.97);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      padding: 1.2rem 2rem;
    }
    .nav-logo {
      text-decoration: none; background: none; border: none; cursor: pointer;
    }
    .nav-logo img {
      height: 64px; width: auto; object-fit: contain;
    }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 4rem 2rem;
      position: relative; z-index: 1;
    }

    .error-wrap {
      text-align: center; max-width: 560px;
      animation: fadeUp 0.8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-hat {
      width: 80px; height: auto;
      margin: 0 auto 2rem;
      opacity: 0.85;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .error-code {
      font-family: 'League Spartan', sans-serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
    }
    .error-code span { color: var(--gold); }

    .error-ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; margin: 1.2rem 0;
    }
    .error-ornament-line {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .error-ornament-line:last-child {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .error-ornament-diamond {
      width: 5px; height: 5px;
      background: var(--gold); transform: rotate(45deg);
    }

    .error-label {
      font-family: 'League Spartan', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 1rem;
    }

    .error-title {
      font-family: 'League Spartan', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700; color: var(--white);
      margin-bottom: 1rem; line-height: 1.2;
    }

    .error-text {
      font-size: 0.95rem; line-height: 1.9;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2.5rem;
    }

    .error-actions {
      display: flex; gap: 1rem;
      justify-content: center; flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 1rem 2.2rem;
      background: transparent; border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'League Spartan', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.28em; text-transform: uppercase;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--gold); color: var(--black); }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 1rem 2.2rem;
      background: transparent; border: 1px solid var(--border-soft);
      color: rgba(255,255,255,0.4);
      font-family: 'League Spartan', sans-serif;
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.3s, color 0.3s;
    }
    .btn-secondary:hover { border-color: var(--gold-dim); color: var(--white); }

    /* ─── FOOTER ─── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1.8rem 2rem;
      display: flex; align-items: center; justify-content: center;
    }
    .footer-copy {
      font-size: 0.72rem; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.2);
      font-family: 'League Spartan', sans-serif;
    }

    @media (max-width: 480px) {
      .error-actions { flex-direction: column; align-items: center; }
      .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="SUITS_quer_negativ.png" alt="SUITS modern menswear" />
    </a>
  </nav>

  <main>
    <div class="error-wrap">

      <img class="error-hat" src="Hut.png" alt="SUITS Hut" />

      <div class="error-code">4<span>0</span>4</div>

      <div class="error-ornament">
        <div class="error-ornament-line"></div>
        <div class="error-ornament-diamond"></div>
        <div class="error-ornament-line"></div>
      </div>

      <p class="error-label">Seite nicht gefunden</p>
      <h1 class="error-title">Diese Seite existiert nicht.</h1>
      <p class="error-text">
        Sieht aus, als hättest Du Dich verlaufen –<br>
        aber keine Sorge, wir finden den richtigen Weg.
      </p>

      <div class="error-actions">
        <a class="btn-primary" href="index.html">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M6 2L1 7l5 5M1 7h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Zurück zur Startseite
        </a>
        <a class="btn-secondary" href="index.html#kontakt">
          Kontakt aufnehmen
        </a>
      </div>

    </div>
  </main>

  <footer>
    <p class="footer-copy">© 2026 SUITS modern menswear</p>
  </footer>

</body>
</html>
